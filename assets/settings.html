<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
    <title>講義ノート設定</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        padding: 16px 18px;
        font-size: 13px;
      }
      h1 { font-size: 15px; margin: 0 0 12px; }
      .row { margin-bottom: 12px; }
      label { display: block; font-weight: 600; margin-bottom: 4px; }
      input[type="text"], input[type="number"], select, textarea {
        width: 100%; box-sizing: border-box; padding: 5px 7px;
        border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
        border-radius: 6px; background: transparent; color: inherit; font: inherit;
      }
      textarea { resize: vertical; min-height: 56px; }
      .hint { opacity: 0.7; font-size: 11px; margin-top: 3px; }
      .inline { display: flex; align-items: center; gap: 6px; }
      .inline label { margin: 0; font-weight: 400; }
      .actions { display: flex; gap: 8px; margin-top: 16px; }
      button {
        padding: 6px 14px; border-radius: 6px; border: 1px solid transparent;
        font: inherit; cursor: pointer;
      }
      button.primary { background: #2f6fed; color: #fff; }
      button.secondary { background: color-mix(in srgb, currentColor 12%, transparent); color: inherit; }
      #status { margin-top: 10px; font-size: 12px; min-height: 16px; }
      #deps { margin-top: 6px; font-size: 12px; white-space: pre-line; }
      .ok { color: #2e9e44; }
      .ng { color: #d23f3f; }
    </style>
  </head>
  <body>
    <h1>講義ノート設定</h1>

    <div class="row">
      <label for="device">マイク</label>
      <select id="device"></select>
    </div>

    <div class="row">
      <label for="engine">要約エンジン</label>
      <select id="engine">
        <option value="claude">claude（サブスク範囲・要クラウド送信）</option>
        <option value="ollama">ollama（完全ローカル・無料）</option>
      </select>
    </div>

    <div class="row">
      <label for="model">要約モデル（任意）</label>
      <input type="text" id="model" placeholder="例: 空欄で既定 / ollama なら llama3.1" />
    </div>

    <div class="row">
      <label for="vocabulary">固有名詞リスト（改行区切り・誤変換抑制用）</label>
      <textarea id="vocabulary" placeholder="奥村組&#10;ネクスコ&#10;生平トンネル"></textarea>
    </div>

    <div class="row">
      <label for="outputRoot">保存先フォルダ</label>
      <input type="text" id="outputRoot" />
    </div>

    <div class="row inline">
      <input type="checkbox" id="cloudConsent" />
      <label for="cloudConsent">claude（クラウド）への文字起こし送信に同意する</label>
    </div>

    <div class="row inline">
      <input type="checkbox" id="liveCaption" />
      <label for="liveCaption">字幕テキストを最初から表示する（速報。録音中にメニューからオン/オフ可・音声レベルは常に表示）</label>
    </div>

    <div class="row">
      <label for="liveModel">ライブ字幕モデル（任意）</label>
      <input type="text" id="liveModel" placeholder="例: mlx-community/whisper-small-mlx" />
      <div class="hint">事前取得が必要: hf download &lt;モデル&gt;</div>
    </div>

    <div class="row">
      <button class="secondary" id="checkDeps" type="button">依存コマンドを確認</button>
      <div id="deps"></div>
    </div>

    <div class="actions">
      <button class="primary" id="save" type="button">保存</button>
      <span id="status"></span>
    </div>

    <script type="module" src="./settings.js"></script>
  </body>
</html>
